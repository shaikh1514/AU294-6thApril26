---
  - name: creating partition
    hosts: servera
    tasks:
      - name: creating 1st partition
        community.general.parted:
          device: /dev/sdb
          number: 1
          state: present
          label: gpt
          part_start: 0%
          part_end: 50%
      - name: creating 2nd partition
        community.general.parted:
          device: /dev/sdb
          number: 2
          state: present
          label: gpt
          part_start: 51%
          part_end: 100%

      - name: assigning filesystem
        community.general.filesystem:
          fstype: xfs
          dev: "{{ item }}"
        loop:
          - /dev/sdb1
          - /dev/sdb2

      - name: creat mount point
        ansible.builtin.file:
          path: "{{ item }}"
          state: directory
        loop:
          - /mnt/part1
          - /mnt/part2

      - name: mount the device
        ansible.posix.mount:
          path: "{{ item.path }}"
          src: "{{ item.src }}"
          fstype: xfs
          state: mounted
        loop:
          - path: /mnt/part1
            src: /dev/sdb1
          - path: /mnt/part2
            src: /dev/sdb2
