---
  - name: generating ssh keys
    hosts: localhost
    vars_files:
     - user-info.yaml
    tasks:
      - name: create directory for ssh keys
        ansible.builtin.file:
          path: /tmp/ssh-keys
          state: directory
      
      - name: generate keys
        ansible.builtin.user:
          name: "{{ item.name }}"
          generate_ssh_key: true
          ssh_key_bits: 2048
          ssh_key_file: "/tmp/ssh-keys/{{ item.name }}"
        loop: "{{ users }}"
